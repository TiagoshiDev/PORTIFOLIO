<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <style>
        body {
    background-color: #000000;
    color: #FFFFFF;
    font-family: 'Montserrat', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
}

.container 
    max-width: 1200px;
    width: 90%;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 80px;
}

.conteudo {
    width: 60%;
    display: flex;
    flex-direction: column;
    gap: 32px;

.title-1 {
    font-family: 'Krona One', sans-serif;
    font-size: 36px;
    line-height: 56px;
}
.change-color {
    color: #22D4FD;
}

.biograph-paragraph-1 {
    font-family: 'Montserrat', sans-serif;
    font-size: 22px;
    line-height: 36px;
    color: #F6F6F6;
}
.buttons {
    display: flex;
    gap: 16px;
}
.button-link {
    background-color: #22D4FD;
    color: #000000;
    font-family: 'Montserrat', sans-serif;
    font-weight: 600;
    font-size: 18px;
    text-align: center;
    text-decoration: none;
    padding: 16px 0;
    width: 180px;
    border-radius: 8px;
    transition: background-color 0.3s;
}

.button-link:hover {
    background-color: #1aa6c7;
}

.imagem-perfil {
    width: 40%;
    max-width: 400px;
    height: auto;
    object-fit: contain;
}
    </style>
    <main class="container">
        <section class="conteudo">
            <h1 class="title-1">
                Eleve seu negócio digital a outro nível
                <span class="change-color">com um Front-end de qualidade!</span>
            </h1>
            <p class="biograph-paragraph-1">
                Olá! Sou Tiago Tocha, desenvolvedor Front-end com especialidade em
                React, HTML e CSS. Ajudo pequenos negócios e designers a colocarem
                em prática boas ideias. Vamos conversar?
            </p>

            <div class="buttons">
                <a class="button-link" href="https://www.instagram.com/tiago._tc/?hl=pt-br/">Instagram</a&gt;
                <a class="button-link" href="https://github.com/">GitHub</a&gt;
            </div>
        </section>

        <img class="imagem-perfil" src="Minhafoto.png" alt="Foto Tiago Tocha Programando">

    </main>
</body>
</html>
